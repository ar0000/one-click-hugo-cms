<div class="bg-off-white pv4">
  <div class="ph3 mw7 center">
    <h2 class="f2 b lh-title mb3 tc text-gradient">{{.intro.heading}}</h2>
    <p class="mb5 mw6 f4 center tc dark-gray lh-copy">{{.intro.text}}</p>

    <div class="flex-ns mhn2-ns mb3">
      {{ range .products }}
      <div class="ph2-ns w-50-ns mb4-m mb0-l">
        <div class="product-card h-100">
          <img
            src="{{.image}}"
            alt=""
            class="center db mb3"
            style="width: 240px"
          />
          <p>{{.text}}</p>
        </div>
      </div>
      {{ end }}
    </div>

    <div class="tc">
      <a href="/products" class="btn ph4 pv3 br-pill f5 b dib link mt4"
        >See all services</a
      >
    </div>
  </div>
</div>
